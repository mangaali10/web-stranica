<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Login - Fudbalski Treneri</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: #fff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 380px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }
        .login-card h2 {
            margin-bottom: 25px;
            color: #2c5364;
            font-size: 26px;
            font-weight: 600;
        }
        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .login-card input:focus {
            border-color: #2c5364;
            box-shadow: 0 0 8px rgba(44,83,100,0.5);
            outline: none;
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2c5364, #203a43);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.3s ease;
        }
        .login-card button:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #203a43, #0f2027);
        }
        .footer-text {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        .footer-text a {
            color: #2c5364;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Prijava Trenera</h2>
        <form>
            <input type="text" name="username" placeholder="Korisničko ime" required>
            <input type="password" name="password" placeholder="Šifra" required>
            <button type="submit">Prijavi se</button>
        </form>
        <div class="footer-text">
            Nemaš nalog? <a href="registracija.html">Registruj se</a>
        </div>
    </div>
</body>
</html>
