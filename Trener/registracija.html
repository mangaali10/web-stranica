<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registracija - Mangos</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff80ab, #80d8ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .signup-container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 10px;
      color: white;
      width: 420px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .signup-container img.logo {
      width: 100px;
      margin-bottom: 20px;
    }

    .signup-container img.illustration {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .signup-container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #ffccff;
    }

    .signup-container input[type="text"],
    .signup-container input[type="email"],
    .signup-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      background-color: #fce4ec;
      color: #333;
    }

    .signup-container button {
      width: 100%;
      padding: 12px;
      background-color: #80d8ff;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .signup-container button:hover {
      background-color: #4fc3f7;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #eee;
    }

    .footer a {
      color: #ffccff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <!-- Logo Mangos -->
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mango_fruit_icon.svg/512px-Mango_fruit_icon.svg.png" alt="Mangos Logo" class="logo">

    <!-- Ilustracija trenera -->
    <img src="https://images.unsplash.com/photo-1606046604972-77c3d0c7f1d5" alt="Fudbalski trener" class="illustration">

    <h2>Registracija na Mangos</h2>
    <form action="registracija.php" method="post">
      <input type="text" name="Ime" placeholder="Ime i prezime" required>
      <input type="email" name="Email" placeholder="Email adresa" required>
      <input type="text"name="Username" placeholder="Korisničko ime" required>
      <input type="password"name="Sifra" placeholder="Lozinka" required>
      <input type="password"name="Potvrda_Sifre" placeholder="Potvrdi lozinku" required>
      <button type="submit" name="dodaj">Registruj se</button>
    </form>





    <div class="footer">
      Već imate nalog? <a href="login.html">Prijavite se</a><br>
      Nemate nalog? <a href="registracija.html">Registruj se</a><br>
      © 2025 Mangos
    </div>
  </div>
</body>
</html>
